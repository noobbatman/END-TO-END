name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations"
        required: false
        default: "true"
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set image metadata
        id: meta
        run: |
          TAG="${{ github.sha }}"
          URI="${{ steps.login-ecr.outputs.registry }}/docintel:${TAG}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "${{ steps.login-ecr.outputs.registry }}/docintel:latest" \
            -t "docintel:${{ github.sha }}" \
            -t "${{ steps.meta.outputs.image_uri }}" \
            -t "${{ steps.login-ecr.outputs.registry }}/docintel:latest" \
            .
        env:
          DOCKER_BUILDKIT: 1
      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${{ steps.login-ecr.outputs.registry }}/docintel:latest"

  migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_migrations == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Render migration task definition
        shell: pwsh
        run: |
          ./aws/render-task-definitions.ps1 `
            -Region "${{ secrets.AWS_REGION }}" `
            -AccountId "${{ secrets.AWS_ACCOUNT_ID }}" `
            -ImageTag "${{ needs.build-and-push.outputs.image_tag }}" `
            -SkipOptionalSecretLookup
      - name: Register task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json "file://aws/rendered/ecs-task-definition-api-fargate.json" \
            --region "${{ secrets.AWS_REGION }}"
      - name: Run migrations as one-off ECS task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster docintel \
            --task-definition docintel-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.API_SECURITY_GROUP }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --region "${{ secrets.AWS_REGION }}" \
            --query "tasks[0].taskArn" \
            --output text)
          aws ecs wait tasks-stopped --cluster docintel --tasks "$TASK_ARN" --region "${{ secrets.AWS_REGION }}"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster docintel \
            --tasks "$TASK_ARN" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)
          test "$EXIT_CODE" = "0"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Render all task definitions
        shell: pwsh
        run: |
          ./aws/render-task-definitions.ps1 `
            -Region "${{ secrets.AWS_REGION }}" `
            -AccountId "${{ secrets.AWS_ACCOUNT_ID }}" `
            -ImageTag "${{ needs.build-and-push.outputs.image_tag }}"
      - name: Register task definitions
        run: |
          for f in aws/rendered/*.json; do
            aws ecs register-task-definition \
              --cli-input-json "file://${f}" \
              --region "${{ secrets.AWS_REGION }}"
          done
      - name: Update ECS services
        run: |
          for SERVICE in docintel-api docintel-worker docintel-worker-high docintel-worker-webhooks; do
            aws ecs update-service \
              --cluster docintel \
              --service "$SERVICE" \
              --force-new-deployment \
              --region "${{ secrets.AWS_REGION }}" \
              --query "service.serviceName" \
              --output text
          done
      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster docintel \
            --services docintel-api docintel-worker docintel-worker-high docintel-worker-webhooks \
            --region "${{ secrets.AWS_REGION }}"
      - name: Verify health endpoint
        run: |
          ALB_DNS="${{ secrets.ALB_DNS }}"
          MAX=20
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "X-API-Key: ${{ secrets.HEALTH_CHECK_API_KEY }}" \
              "https://${ALB_DNS}/api/v1/health/ready" || echo "000")
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          exit 1
