name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check app/ tests/ scripts/ --output-format=github

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: docintel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/docintel_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      API_KEYS: ""
      STORAGE_BACKEND: local
      RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Install system OCR deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng poppler-utils
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  evaluate:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install system OCR deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng poppler-utils
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run benchmark evaluation
        run: python scripts/evaluate.py --dataset evaluation/ground_truth/manifest.json
      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            evaluation/REPORT.md
            evaluation/results.json
